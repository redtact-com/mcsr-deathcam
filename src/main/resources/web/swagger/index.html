<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mcsr-deathcam API — Swagger UI</title>
  <link rel="stylesheet" href="/swagger/swagger-ui.css">
  <style>
    /* Always the light (white) theme — Swagger UI's own CSS is light; keep the page light too. */
    html, body { margin: 0; background: #ffffff; color: #3b4151; }
    #swagger-ui { background: #ffffff; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="/swagger/swagger-ui-bundle.js"></script>
  <script src="/swagger/swagger-ui-standalone-preset.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      urls: [
        { url: '/api/openapi.yaml', name: 'mcsr-deathcam dashboard API' },
        { url: '/api/mcsrranked.yaml', name: 'MCSR Ranked API (official)' }
      ],
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      plugins: [SwaggerUIBundle.plugins.DownloadUrl],
      layout: 'StandaloneLayout',
      tryItOutEnabled: true
    });
  </script>
</body>
</html>
